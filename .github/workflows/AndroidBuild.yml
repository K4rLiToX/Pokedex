name: AndroidBuild

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Set Up JDK
        uses: actions/setup-java@v4.0.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set Up Gradle
        uses: gradle/gradle-build-action@v3.0.0

      - name: Build App
        run: ./gradlew assemble